; ============================================================
; ESP32 WROOM Racing Dashboard
; Display: ILI9488 480x320 SPI
; ============================================================

[env:esp32-wroom]
platform   = espressif32@^6.9.0
board      = esp32dev
framework  = arduino

; 240 MHz for faster rendering
board_build.f_cpu = 240000000L

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43

; Build flags — ILI9488 config injected here so no User_Setup.h editing needed
build_flags =
    -DUSER_SETUP_LOADED=1
    ; ----- ILI9488 Driver -----
    -DILI9488_DRIVER=1
    ; ----- Display size -----
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    ; ----- SPI Pins (standard ESP32 WROOM 30-pin) -----
    ; Adjust these to match your wiring if different
    -DTFT_MOSI=23
    -DTFT_MISO=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=15
    ; ----- SPI frequency -----
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    ; ----- Enable DMA (speeds up rendering significantly) -----
    -DSUPPORT_TRANSACTIONS=1
    ; ----- Smooth fonts (for nicer text) -----
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; ----- Backlight control -----
    -DTFT_BACKLIGHT_ON=HIGH
    ; ----- Serial baud rate -----
    -DSERIAL_BAUD=115200

monitor_speed = 115200
